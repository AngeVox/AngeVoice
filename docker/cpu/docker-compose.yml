name: angevoice-cpu

services:
  angevoice-cpu:
    image: docker.io/maxblack777/angevoice-cpu:latest
    container_name: angevoice-cpu
    build:
      context: ../..
      dockerfile: docker/cpu/Dockerfile
    ports:
      # Host port:container port. Open http://HOST_IP:8100
      - "8100:8000"

    volumes:
      # Local model directory. Real model files require Git LFS or huggingface-cli download.
      - ../../models:/app/models:ro
      # Persist Hugging Face cache so downloaded model/voice files survive container recreation.
      - ../../.cache/huggingface:/root/.cache/huggingface
      # Development hot-reload. Uncomment for git pull + docker compose restart workflows.
      # - ../../src:/app/src:ro
      # Writable voices directory for optional admin voice upload.
      # - ../../models/voices:/app/models/voices:rw

    env_file:
      # Copy .env.example -> .env and customize, or use environment-specific files:
      #   cp .env.dev .env       (轻量开发)
      #   cp .env.staging .env   (预发布)
      #   cp .env.prod .env      (生产)
      - path: .env
        required: false

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    restart: always
