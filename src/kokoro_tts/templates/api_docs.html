<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="docs.page.title">AngeVoice API 文档</title>
  <script>
    const savedTheme = localStorage.getItem('angevoice.theme.v1');
    document.documentElement.dataset.theme = savedTheme || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  </script>
  <script type="importmap">{{ asset_import_map_json() | safe }}</script>
  <link rel="icon" href="{{ asset_url('favicon.svg') }}" type="image/svg+xml" />
  <link rel="stylesheet" href="{{ asset_url('app.css') }}" />
  <link rel="stylesheet" href="{{ asset_url('docs/docs.css') }}" />
</head>
<body>
  <script id="angevoice-docs-bootstrap" type="application/json">{{ bootstrap | tojson }}</script>

  <main class="docs-shell">
    <section class="docs-hero">
      <div>
        <p class="eyebrow" data-i18n="docs.hero.eyebrow">AngeVoice API Docs</p>
        <h1 data-i18n="docs.hero.title">API 调用文档与 MOSS 语音克隆示例</h1>
        <p id="docs-hero-description" data-i18n="docs.hero.desc">API 文档</p>
        <div class="pill-row">
          <span id="auth-pill"></span>
          <span>HTTP: /v1/audio/speech, /api/tts</span>
          <span>WebSocket: /ws/v1/tts</span>
        </div>
      </div>
      <div class="docs-actions">
        <a href="/" data-i18n="docs.link.studio">返回 Studio</a>
        <a href="/docs" data-i18n="docs.link.swagger">Swagger</a>
        <a href="/redoc" data-i18n="docs.link.redoc">ReDoc</a>
        <a href="/health" data-i18n="docs.link.health">Health</a>
        <details class="locale-menu" data-locale-menu>
          <summary class="icon-button locale-summary" data-i18n-title="top.language">
            <span aria-hidden="true">文</span>
            <b data-current-locale>简体中文</b>
          </summary>
          <div class="locale-options">
            <button type="button" data-locale-choice="zh-CN" data-i18n="language.zh">简体中文</button>
            <button type="button" data-locale-choice="en" data-i18n="language.en">English</button>
          </div>
        </details>
      </div>
    </section>

    <section class="docs-grid">
      <nav class="docs-nav" id="docs-nav" data-i18n-aria-label="docs.nav.aria"></nav>
      <div class="docs-content" id="docs-content"></div>
    </section>
  </main>

  <script type="module" src="{{ asset_url('common/i18n.js') }}"></script>
  <script type="module" src="{{ asset_url('docs/docs.js') }}"></script>
</body>
</html>
