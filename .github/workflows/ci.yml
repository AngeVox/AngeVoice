name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Architecture and i18n quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install locked lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements/test.lock
          python -m pip check
          python -m pip install -e . --no-deps

      - name: Run quality gates
        run: pytest -q tests/quality

  test:
    name: Python tests (${{ matrix.python-version }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1 ffmpeg

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          # CI 单元/合同测试避免加载真实模型；依赖必须来自已提交锁文件。
          python -m pip install --require-hashes -r requirements/test.lock
          python -m pip install --require-hashes -r requirements/test-torch-cpu.lock
          python -m pip check
          python -m pip install -e . --no-deps

      - name: Run tests
        run: |
          pytest -q --cov=kokoro_tts --cov-report=term-missing --cov-fail-under=70

      - name: Import and CLI smoke check
        run: |
          VERSION=$(python - <<'PY'
          import importlib.metadata
          import kokoro_tts
          package_version = importlib.metadata.version("angevoice")
          assert package_version == kokoro_tts.__version__
          print(kokoro_tts.__version__)
          PY
          )
          echo "AngeVoice version: ${VERSION}"
          angevoice --version | grep "${VERSION}"
          kokoro-tts --version | grep "${VERSION}"
